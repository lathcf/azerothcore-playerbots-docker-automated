<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>My account</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Spectral:wght@400;500&display=swap">
<link rel="stylesheet" href="/static/style.css"></head>
<body><main>
<p class="kicker">Your Account</p>
<h1>Hail, {{.User}}</h1>
<div class="rule"><span></span></div>
{{if .Error}}<p class="error">{{.Error}}</p>{{end}}
{{if .Notice}}<p class="notice">{{.Notice}}</p>{{end}}
<h2>Change Password</h2>
<form method="post" action="/account/password">
  <label>Current Password<input name="current" type="password" maxlength="16" required autocomplete="current-password"></label>
  <label>New Password<input name="password" type="password" maxlength="16" required autocomplete="new-password"></label>
  <button type="submit">Update Password</button>
</form>
<form class="account-actions" method="post" action="/logout"><button type="submit">Log Out</button></form>
</main></body></html>
